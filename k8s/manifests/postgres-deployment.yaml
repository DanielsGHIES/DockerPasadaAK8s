apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskapp-postgres
  template:
    metadata:
      labels:
        app: taskapp-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: taskapp
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
