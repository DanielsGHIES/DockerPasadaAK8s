apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskapp-backend
  template:
    metadata:
      labels:
        app: taskapp-backend
    spec:
      containers:
        - name: backend
          image: app-backend:latest
          imagePullPolicy: Never
          securityContext:
            # Vulnerabilidad existente: KICS detectaba allowPrivilegeEscalation habilitado por omision.
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: taskapp-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: taskapp
